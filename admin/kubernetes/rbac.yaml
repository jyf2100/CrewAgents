---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-admin
  namespace: hermes-agent
  labels:
    app: hermes-admin
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-admin
  namespace: hermes-agent
  labels:
    app: hermes-admin
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-admin
  namespace: hermes-agent
  labels:
    app: hermes-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hermes-admin
subjects:
  - kind: ServiceAccount
    name: hermes-admin
    namespace: hermes-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: hermes-admin
  labels:
    app: hermes-admin
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups:
      - metrics.k8s.io
    resources:
      - pods
      - nodes
    verbs:
      - get
      - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: hermes-admin
  labels:
    app: hermes-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: hermes-admin
subjects:
  - kind: ServiceAccount
    name: hermes-admin
    namespace: hermes-agent
