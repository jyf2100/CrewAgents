# =============================================================================
# Hermes Agent K8s Deployment Template
# Placeholder values: {{AGENT_NUMBER}}, {{SECRET_NAME}}, {{NAMESPACE}}
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-gateway-{{AGENT_NUMBER}}
  namespace: {{NAMESPACE}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-gateway-{{AGENT_NUMBER}}
  template:
    metadata:
      labels:
        app: hermes-gateway-{{AGENT_NUMBER}}
    spec:
      serviceAccountName: hermes-gateway
      containers:
        - name: gateway
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          args: ["gateway"]
          ports:
            - containerPort: 8642
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: API_SERVER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{SECRET_NAME}}
                  key: api_key
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: K8S_NAMESPACE
              value: {{NAMESPACE}}
            - name: SANDBOX_POOL_NAME
              value: hermes-sandbox-pool
            - name: SANDBOX_TTL_MINUTES
              value: "30"
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 5
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
      volumes:
        - name: hermes-data
          hostPath:
            path: /data/hermes/agent{{AGENT_NUMBER}}
            type: DirectoryOrCreate
