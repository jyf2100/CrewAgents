services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-agent
    command: gateway
    ports:
      - "8642:8642"
    volumes:
      - hermes-data:/opt/data
      - ./.env:/opt/data/.env
      - ./docker/config.yaml:/opt/data/config.yaml
    env_file:
      - path: .env
        required: false
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
      - API_SERVER_ENABLED=true
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_PORT=8642
      - API_SERVER_KEY=${API_SERVER_KEY:-}
      - GATEWAY_ALLOW_ALL_USERS=true
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    restart: unless-stopped

  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hermes-webui
    ports:
      - "3001:8080"
    volumes:
      - webui-data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://hermes:8642/v1
      - OPENAI_API_KEY=${API_SERVER_KEY:-}
      - WEBUI_AUTH=false
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - hermes
    restart: unless-stopped

  setup:
    image: nousresearch/hermes-agent:latest
    container_name: hermes-setup
    entrypoint: ["python3", "/opt/hermes/docker/setup_server.py"]
    ports:
      - "3000:3000"
      - "8643:8643"
    volumes:
      - hermes-data:/opt/data
      - ./.env:/opt/data/.env
      - ./docker/setup_server.py:/opt/hermes/docker/setup_server.py
      - ./docker/config.yaml:/opt/data/config.yaml
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - HERMES_HOME=/opt/data
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

volumes:
  hermes-data:
  webui-data:
