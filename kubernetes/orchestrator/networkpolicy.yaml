apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: hermes-orchestrator
  namespace: hermes-agent
spec:
  podSelector:
    matchLabels:
      app: hermes-orchestrator
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: hermes-admin
      ports:
        - port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gateway
      ports:
        - port: 8642
    - to:
        - podSelector:
            matchLabels:
              app: hermes-redis
      ports:
        - port: 6379
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
          protocol: TCP
    - to:
        - ipBlock:
            cidr: 172.32.153.184/32
      ports:
        - port: 6443
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
