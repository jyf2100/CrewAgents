apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-webui
  namespace: hermes-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-webui
  template:
    metadata:
      labels:
        app: hermes-webui
    spec:
      containers:
        - name: webui
          image: ghcr.io/open-webui/open-webui:main
          ports:
            - containerPort: 8080
          env:
            - name: OPENAI_API_BASE_URL
              value: "http://hermes-gateway:8642/v1"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-db-secret
                  key: api_key
                  optional: true
            - name: WEBUI_AUTH
              value: "false"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
