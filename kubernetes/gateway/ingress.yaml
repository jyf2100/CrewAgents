apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-gateway-ingress
  namespace: hermes-agent
spec:
  tls:
    - hosts:
        - hermes.internal.example.com
      secretName: hermes-tls-secret
  rules:
    - host: hermes.internal.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hermes-gateway
                port:
                  number: 8642
