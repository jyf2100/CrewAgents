apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hermes-ingress
  namespace: hermes-agent
spec:
  tls:
    - hosts:
        - hermes.local
      secretName: hermes-tls-secret
  rules:
    - host: hermes.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: hermes-gateway
                port:
                  number: 8642
          - path: /dashboard
            pathType: Prefix
            backend:
              service:
                name: hermes-gateway
                port:
                  number: 9119
          - path: /webui
            pathType: Prefix
            backend:
              service:
                name: hermes-webui
                port:
                  number: 8080
