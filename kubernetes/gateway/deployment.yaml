apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-gateway
  namespace: hermes-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-gateway
  template:
    metadata:
      labels:
        app: hermes-gateway
    spec:
      serviceAccountName: hermes-gateway
      containers:
        - name: gateway
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: IfNotPresent
          command: ["bash", "-c", "uv pip install --system --break-system-packages 'hermes-agent[web]' -i https://pypi.tuna.tsinghua.edu.cn/simple && hermes gateway & python3 -m hermes_cli.main dashboard --host 0.0.0.0 --port 9119 --insecure & wait"]
          ports:
            - containerPort: 8642
            - containerPort: 9119
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: GATEWAY_ALLOW_ALL_USERS
              value: "true"
            - name: K8S_NAMESPACE
              value: "hermes-agent"
            - name: SANDBOX_POOL_NAME
              value: "hermes-sandbox-pool"
            - name: SANDBOX_TTL_MINUTES
              value: "30"
            - name: DB_HOST
              value: "postgres.hermes-agent.svc.cluster.local"
            - name: DB_NAME
              value: "hermes"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: hermes-db-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-db-secret
                  key: password
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 8642
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: hermes-data
              mountPath: /opt/data
      volumes:
        - name: hermes-data
          persistentVolumeClaim:
            claimName: hermes-data-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-gateway
  namespace: hermes-agent
spec:
  type: ClusterIP
  ports:
    - name: api
      port: 8642
      targetPort: 8642
    - name: dashboard
      port: 9119
      targetPort: 9119
  selector:
    app: hermes-gateway
