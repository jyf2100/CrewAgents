apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: hermes-admin
  name: hermes-admin
  namespace: hermes-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes-admin
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: hermes-admin
    spec:
      containers:
        - name: admin
          image: hermes-admin:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 48082
              name: http
              protocol: TCP
          env:
            - name: K8S_NAMESPACE
              value: hermes-agent
            - name: ADMIN_KEY
              valueFrom:
                secretKeyRef:
                  name: hermes-admin-secret
                  key: admin_key
            - name: HERMES_DATA_ROOT
              value: /data/hermes
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: EXTERNAL_URL_PREFIX
              value: http://172.32.153.184:40080
            - name: SWARM_REDIS_URL
              value: redis://:$(REDIS_PASSWORD)@hermes-redis:6379/0
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: hermes-redis-secret
                  key: redis-password
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: database-url
            - name: ADMIN_INTERNAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hermes-admin-internal-secret
                  key: admin_internal_token
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - mountPath: /data/hermes
              name: hermes-data-root
      serviceAccountName: hermes-admin
      volumes:
        - name: hermes-data-root
          hostPath:
            path: /data/hermes
            type: DirectoryOrCreate
