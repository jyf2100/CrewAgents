apiVersion: sandbox.opensandbox.io/v1alpha1
kind: Pool
metadata:
  name: hermes-sandbox-pool
  namespace: hermes-agent
spec:
  template:
    metadata:
      labels:
        app: sandbox
    spec:
      serviceAccountName: sandbox
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      initContainers:
        # init container: 等待主容器就绪后注册 Endpoints
        - name: registry-init
          image: nousresearch/hermes-agent:v0.8.0
          imagePullPolicy: IfNotPresent
          command: ["python3", "/opt/hermes/scripts/registry-init.py"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: SANDBOX_PORT
              value: "8642"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        # 主容器：Hermes Agent（Gateway 模式，无 messaging token 时只启动 API server）
        - name: sandbox
          image: nousresearch/hermes-agent:v0.8.0
          imagePullPolicy: IfNotPresent
          command: ["hermes", "gateway"]
          ports:
            - containerPort: 8642
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: API_SERVER_ENABLED
              value: "true"
            - name: API_SERVER_HOST
              value: "0.0.0.0"
            - name: API_SERVER_PORT
              value: "8642"
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: HERMES_HOME
              value: "/opt/data"
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - |
                    curl -sf -X POST http://localhost:8080/deregister || true
                    sleep 2
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: sandbox-data
              mountPath: /opt/data
        # Sidecar：Registry Agent（处理注销请求）
        - name: registry-agent
          image: nousresearch/hermes-agent:v0.8.0
          imagePullPolicy: IfNotPresent
          command: ["python3", "/opt/hermes/scripts/registry-agent.py"]
          ports:
            - containerPort: 8080
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SANDBOX_PORT
              value: "8642"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: sandbox-data
          emptyDir: {}
  capacitySpec:
    bufferMin: 5
    bufferMax: 15
    poolMin: 5
    poolMax: 30