apiVersion: v1
kind: ServiceAccount
metadata:
  name: sandbox
  namespace: hermes-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sandbox-endpoints
  namespace: hermes-agent
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sandbox-endpoints
  namespace: hermes-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sandbox-endpoints
subjects:
  - kind: ServiceAccount
    name: sandbox
    namespace: hermes-agent
